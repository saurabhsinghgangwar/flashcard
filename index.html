<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Karteikarten">
<title>Karteikarten</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #252525;
    --accent: #4a9eff;
    --accent-dim: #4a9eff22;
    --green: #34c759;
    --orange: #ff9f0a;
    --red: #ff453a;
    --text: #f5f5f5;
    --text2: #999;
    --radius: 16px;
    --safe-top: env(safe-area-inset-top, 20px);
    --safe-bottom: env(safe-area-inset-bottom, 20px);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    position: fixed;
    width: 100%;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ---- NAV ---- */
  .nav {
    display: flex;
    justify-content: space-around;
    align-items: center;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #111;
    border-top: 1px solid #222;
    padding: 8px 0 calc(8px + var(--safe-bottom));
    z-index: 100;
  }
  .nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    background: none;
    border: none;
    color: var(--text2);
    font-size: 10px;
    padding: 4px 16px;
    cursor: pointer;
    transition: color 0.2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 24px; height: 24px; }

  /* ---- SCREENS ---- */
  .screen {
    display: none;
    flex-direction: column;
    height: 100dvh;
    padding: calc(var(--safe-top) + 12px) 20px calc(80px + var(--safe-bottom));
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .screen.active { display: flex; }
  .screen-title {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 20px;
  }

  /* ---- REVIEW SCREEN ---- */
  .review-screen { align-items: center; justify-content: center; padding-top: var(--safe-top); }

  .empty-state {
    text-align: center;
    color: var(--text2);
    padding: 40px 20px;
  }
  .empty-state p { margin-top: 12px; font-size: 15px; line-height: 1.5; }
  .empty-state svg { opacity: 0.3; }

  .review-info {
    text-align: center;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--text2);
  }
  .review-info span { color: var(--accent); font-weight: 600; }

  .card-container {
    width: 100%;
    max-width: 340px;
    height: 220px;
    perspective: 1000px;
    cursor: pointer;
    margin-bottom: 32px;
  }
  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: var(--surface);
    border: 1px solid #333;
  }
  .card-back { transform: rotateY(180deg); }
  .card-lang {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text2);
    margin-bottom: 12px;
  }
  .card-word {
    font-size: 28px;
    font-weight: 600;
    text-align: center;
    line-height: 1.3;
  }
  .card-hint {
    font-size: 12px;
    color: var(--text2);
    margin-top: 16px;
  }
  .speak-btn {
    background: none;
    border: none;
    color: var(--text2);
    padding: 6px;
    margin-top: 10px;
    cursor: pointer;
    border-radius: 50%;
    transition: color 0.2s, background 0.2s;
  }
  .speak-btn:active { color: var(--accent); background: var(--accent-dim); }
  .speak-btn svg { width: 24px; height: 24px; display: block; }

  .rating-buttons {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 340px;
  }
  .rating-btn {
    flex: 1;
    padding: 14px 8px;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    color: #fff;
    transition: transform 0.1s, opacity 0.2s;
  }
  .rating-btn:active { transform: scale(0.95); }
  .rating-btn.again { background: var(--red); }
  .rating-btn.hard { background: var(--orange); }
  .rating-btn.good { background: var(--green); }
  .rating-btn.easy { background: var(--accent); }
  .rating-buttons.hidden { visibility: hidden; }

  .done-message {
    text-align: center;
    color: var(--text2);
  }
  .done-message .check { font-size: 48px; margin-bottom: 16px; }
  .done-message p { font-size: 15px; line-height: 1.5; }

  /* ---- MODE PICKER ---- */
  .mode-picker {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 340px;
  }
  .mode-picker-title {
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 8px;
  }
  .mode-btn {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px;
    background: var(--surface);
    border: 1px solid #333;
    border-radius: var(--radius);
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: border-color 0.2s, background 0.2s;
  }
  .mode-btn:active { background: var(--surface2); }
  .mode-btn-icon {
    font-size: 28px;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
    border-radius: 12px;
    flex-shrink: 0;
  }
  .mode-btn-text { flex: 1; }
  .mode-btn-label { font-size: 16px; font-weight: 600; }
  .mode-btn-desc { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .mode-btn-count { font-size: 12px; color: var(--accent); margin-top: 4px; font-weight: 500; }

  /* ---- TYPE MODE ---- */
  .type-card {
    width: 100%;
    max-width: 340px;
    background: var(--surface);
    border: 1px solid #333;
    border-radius: var(--radius);
    padding: 28px 24px;
    text-align: center;
    margin-bottom: 20px;
  }
  .type-input-wrap {
    width: 100%;
    max-width: 340px;
    margin-bottom: 16px;
  }
  .type-input {
    width: 100%;
    padding: 14px 16px;
    background: var(--surface);
    border: 2px solid #333;
    border-radius: 12px;
    color: var(--text);
    font-size: 18px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }
  .type-input:focus { border-color: var(--accent); }
  .type-input::placeholder { color: #444; }
  .type-input.correct { border-color: var(--green); color: var(--green); }
  .type-input.wrong { border-color: var(--red); color: var(--red); }
  .check-btn {
    width: 100%;
    max-width: 340px;
    padding: 14px;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 12px;
    transition: opacity 0.2s;
  }
  .check-btn:active { opacity: 0.8; }
  .type-result {
    width: 100%;
    max-width: 340px;
    text-align: center;
    margin-bottom: 16px;
    font-size: 15px;
    line-height: 1.5;
  }
  .type-result .correct-word { color: var(--green); font-weight: 600; font-size: 22px; }
  .type-result .wrong-label { color: var(--red); font-size: 13px; }
  .type-result .your-answer { color: var(--red); text-decoration: line-through; font-size: 16px; }
  .next-btn {
    width: 100%;
    max-width: 340px;
    padding: 14px;
    background: var(--surface2);
    border: 1px solid #444;
    border-radius: 12px;
    color: var(--text);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .next-btn:active { background: #333; }

  /* ---- WORDS SCREEN ---- */
  .add-form {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 24px;
  }
  .input-row { display: flex; gap: 10px; }
  .input-row input {
    flex: 1;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid #333;
    border-radius: 12px;
    color: var(--text);
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-row input:focus { border-color: var(--accent); }
  .input-row input::placeholder { color: #555; }
  .add-btn {
    padding: 14px;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .add-btn:active { opacity: 0.8; }

  .word-count {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 12px;
  }

  .word-list { display: flex; flex-direction: column; gap: 8px; }
  .word-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid transparent;
  }
  .word-item-text { flex: 1; }
  .word-item-de { font-weight: 600; font-size: 15px; }
  .word-item-en { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .word-item-streak {
    font-size: 11px;
    color: var(--text2);
    margin-top: 4px;
  }
  .word-item-streak .learning { color: var(--orange); }
  .word-item-streak .known { color: var(--green); }
  .word-delete {
    background: none;
    border: none;
    color: #555;
    font-size: 20px;
    padding: 4px 8px;
    cursor: pointer;
    transition: color 0.2s;
  }
  .word-delete:hover { color: var(--red); }

  .search-input {
    width: 100%;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid #333;
    border-radius: 12px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    margin-bottom: 16px;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: #555; }

  /* ---- SETTINGS SCREEN ---- */
  .settings-group {
    background: var(--surface);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .settings-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px;
    border-bottom: 1px solid #222;
  }
  .settings-item:last-child { border-bottom: none; }
  .settings-label { font-size: 15px; }
  .settings-desc { font-size: 12px; color: var(--text2); margin-top: 2px; }

  .settings-btn {
    padding: 8px 16px;
    background: var(--surface2);
    border: 1px solid #333;
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .settings-btn:active { background: #333; }
  .settings-btn.danger { color: var(--red); border-color: var(--red); }


  /* ---- MODAL ---- */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px calc(24px + var(--safe-bottom));
    width: 100%;
    max-width: 500px;
    text-align: center;
  }
  .modal h3 { font-size: 18px; margin-bottom: 8px; }
  .modal p { font-size: 14px; color: var(--text2); margin-bottom: 20px; line-height: 1.4; }
  .modal-actions { display: flex; gap: 10px; }
  .modal-actions button {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .modal-cancel { background: var(--surface2); color: var(--text); }
  .modal-confirm { background: var(--red); color: #fff; }

  /* ---- GENDER COLORS ---- */
  .gender-der { color: #4a9eff; }
  .gender-die { color: #ff453a; }
  .gender-das { color: #34c759; }
  .gender-none { color: var(--text); }

  .gender-picker {
    display: flex;
    gap: 8px;
  }
  .gender-btn {
    flex: 1;
    padding: 10px 4px;
    border: 2px solid #333;
    border-radius: 10px;
    background: var(--surface);
    color: var(--text2);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .gender-btn.sel-der { border-color: #4a9eff; color: #4a9eff; background: #4a9eff15; }
  .gender-btn.sel-die { border-color: #ff453a; color: #ff453a; background: #ff453a15; }
  .gender-btn.sel-das { border-color: #34c759; color: #34c759; background: #34c75915; }
  .gender-btn.sel-none { border-color: #666; color: var(--text); background: var(--surface2); }

  .word-item-gender {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    margin-right: 4px;
  }

  /* ---- NOTES SCREEN ---- */
  .notes-search {
    width: 100%;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid #333;
    border-radius: 12px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    margin-bottom: 12px;
  }
  .notes-search:focus { border-color: var(--accent); }
  .notes-search::placeholder { color: #555; }

  .notes-add-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 16px;
    transition: opacity 0.2s;
  }
  .notes-add-btn:active { opacity: 0.8; }

  .note-count {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 12px;
  }

  .notes-list { display: flex; flex-direction: column; gap: 10px; }
  .note-card {
    padding: 16px;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid #333;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .note-card:active { border-color: var(--accent); }
  .note-card-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .note-card-category {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 2px 8px;
    border-radius: 6px;
    margin-bottom: 8px;
  }
  .note-card-preview {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Note viewer */
  #notesContent {
    width: 100%;
    max-width: 700px;
  }
  .note-viewer {
  }
  .note-viewer-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .note-back-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 16px;
    padding: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    margin-right: auto;
  }
  .note-viewer-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .note-viewer-actions {
    display: flex;
    gap: 8px;
  }
  .note-action-btn {
    background: var(--surface2);
    border: 1px solid #333;
    border-radius: 8px;
    color: var(--text);
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
  }
  .note-action-btn.danger { color: var(--red); border-color: var(--red); }
  .note-viewer-category {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 3px 10px;
    border-radius: 6px;
    margin-bottom: 16px;
  }
  .note-viewer-content {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
    word-wrap: break-word;
  }

  /* Note editor modal */
  .note-editor-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 300;
    flex-direction: column;
    padding: calc(var(--safe-top) + 12px) 20px calc(20px + var(--safe-bottom));
  }
  .note-editor-overlay.show { display: flex; }
  .note-editor-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .note-editor-header h2 { font-size: 20px; font-weight: 700; }
  .note-editor-cancel {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 16px;
    cursor: pointer;
    padding: 4px 8px;
  }
  .note-editor-save {
    padding: 8px 20px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .note-editor-field {
    margin-bottom: 12px;
  }
  .note-editor-field label {
    display: block;
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 6px;
  }
  .note-editor-field input,
  .note-editor-field textarea {
    width: 100%;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid #333;
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    font-family: inherit;
  }
  .note-editor-field input:focus,
  .note-editor-field textarea:focus { border-color: var(--accent); }
  .note-editor-field textarea {
    flex: 1;
    min-height: 200px;
    resize: none;
    line-height: 1.6;
  }
  .note-editor-body {
    display: flex;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }
  .note-editor-body .note-editor-field:last-child {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* Note tables */
  .note-table-wrap {
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin: 10px 0;
  }
  .note-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    min-width: 280px;
  }
  .note-table th, .note-table td {
    padding: 8px 10px;
    border: 1px solid #333;
    text-align: left;
  }
  .note-table th {
    background: var(--surface2);
    font-weight: 600;
    color: var(--text);
  }
  .note-table tr:nth-child(even) td { background: #1e1e1e; }

  /* Note lists */
  .note-list {
    padding-left: 20px;
    margin: 6px 0;
  }
  .note-list li {
    padding: 3px 0;
    line-height: 1.6;
  }

  .note-viewer-content strong { color: var(--text); }

  /* file input hidden */
  #importFile { display: none; }
</style>
</head>
<body>

<!-- ===== REVIEW SCREEN ===== -->
<div class="screen review-screen active" id="screenReview">
  <div id="reviewContent"></div>
</div>

<!-- ===== WORDS SCREEN ===== -->
<div class="screen" id="screenWords">
  <h1 class="screen-title">Words</h1>
  <div class="add-form">
    <div class="input-row">
      <input type="text" id="inputDe" placeholder="German" autocomplete="off" autocapitalize="none" spellcheck="false">
      <input type="text" id="inputEn" placeholder="English" autocomplete="off" autocapitalize="none" spellcheck="false">
    </div>
    <div class="gender-picker" id="genderPicker">
      <button class="gender-btn" onclick="pickGender('der')" id="gBtn-der">der</button>
      <button class="gender-btn" onclick="pickGender('die')" id="gBtn-die">die</button>
      <button class="gender-btn" onclick="pickGender('das')" id="gBtn-das">das</button>
      <button class="gender-btn" onclick="pickGender('none')" id="gBtn-none">–</button>
    </div>
    <button class="add-btn" onclick="addWord()">Add Word</button>
  </div>
  <input type="text" class="search-input" id="searchInput" placeholder="Search words..." oninput="renderWordList()">
  <div class="word-count" id="wordCount"></div>
  <div class="word-list" id="wordList"></div>
</div>

<!-- ===== NOTES SCREEN ===== -->
<div class="screen" id="screenNotes">
  <div id="notesContent">
    <h1 class="screen-title">Notes</h1>
    <button class="notes-add-btn" onclick="openNoteEditor()">+ Add Note</button>
    <input type="text" class="notes-search" id="notesSearch" placeholder="Search notes..." oninput="renderNotesList()">
    <div class="note-count" id="noteCount"></div>
    <div class="notes-list" id="notesList"></div>
  </div>
</div>

<script>
// ===== DATA =====
let words = []; // { id, de, en, ease, interval, repetitions, nextReview, lastReview }
let notes = []; // { id, title, category, content, createdAt, updatedAt }
let settings = { newCardsLimit: 10 };

const STORAGE_KEY = 'karteikarten_words';
const SETTINGS_KEY = 'karteikarten_settings';
const NOTES_KEY = 'karteikarten_notes';

function load() {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    if (d) words = JSON.parse(d);
    const s = localStorage.getItem(SETTINGS_KEY);
    if (s) settings = JSON.parse(s);
    const n = localStorage.getItem(NOTES_KEY);
    if (n) notes = JSON.parse(n);
  } catch(e) {}
  document.getElementById('newCardsLimit').value = settings.newCardsLimit || 10;
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(words));
}

function saveNotes() {
  localStorage.setItem(NOTES_KEY, JSON.stringify(notes));
}

function saveSettings() {
  settings.newCardsLimit = parseInt(document.getElementById('newCardsLimit').value);
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
}

// ===== SM-2 SPACED REPETITION =====
function today() {
  return Math.floor(Date.now() / 86400000);
}

function createCard(de, en, gender) {
  return {
    id: Date.now() + Math.random(),
    de: de.trim(),
    en: en.trim(),
    gender: gender || 'none',
    ease: 2.5,
    interval: 0,
    repetitions: 0,
    nextReview: today(),
    lastReview: 0
  };
}

let selectedGender = 'none';

function pickGender(g) {
  selectedGender = g;
  ['der','die','das','none'].forEach(x => {
    document.getElementById('gBtn-' + x).className = 'gender-btn' + (x === g ? ' sel-' + x : '');
  });
}

function genderColor(g) {
  if (g === 'der') return '#4a9eff';
  if (g === 'die') return '#ff453a';
  if (g === 'das') return '#34c759';
  return '';
}

function genderClass(g) {
  if (g === 'der') return 'gender-der';
  if (g === 'die') return 'gender-die';
  if (g === 'das') return 'gender-das';
  return 'gender-none';
}

function coloredDe(card) {
  const g = card.gender || 'none';
  const color = genderColor(g);
  const prefix = g !== 'none' ? g + ' ' : '';
  if (color) {
    return `<span style="color:${color}">${escHtml(prefix + card.de)}</span>`;
  }
  return escHtml(card.de);
}

function reviewCard(card, quality) {
  // quality: 0=again, 1=hard, 2=good, 3=easy
  const q = [0, 2, 4, 5][quality]; // map to SM-2 scale (0-5)

  if (q < 3) {
    // Failed - reset
    card.repetitions = 0;
    card.interval = 0;
  } else {
    if (card.repetitions === 0) {
      card.interval = 1;
    } else if (card.repetitions === 1) {
      card.interval = 3;
    } else {
      card.interval = Math.round(card.interval * card.ease);
    }
    card.repetitions++;
  }

  // Update ease factor
  card.ease = Math.max(1.3, card.ease + (0.1 - (5 - q) * (0.08 + (5 - q) * 0.02)));

  // Special intervals for hard/easy
  if (quality === 1 && card.interval > 1) {
    card.interval = Math.max(1, Math.round(card.interval * 0.7));
  } else if (quality === 3) {
    card.interval = Math.max(card.interval, Math.round(card.interval * 1.3));
  }

  card.nextReview = today() + Math.max(quality === 0 ? 0 : 1, card.interval);
  card.lastReview = today();

  save();
}

// ===== REVIEW =====
let currentCard = null;
let reviewMode = null; // 'en2de', 'en2de_flip', or 'de2en', set by mode picker
let reviewQueue = [];
let isFlipped = false;
let isPracticeAll = false;
let practiceDirections = [];
let practiceIndex = 0;

function buildReviewQueue() {
  const d = today();
  const due = words.filter(w => w.nextReview <= d);

  // Separate into review (seen before) and new cards
  const review = due.filter(w => w.repetitions > 0);
  const newCards = due.filter(w => w.repetitions === 0);

  // Limit new cards
  const limit = settings.newCardsLimit || 10;
  const limitedNew = newCards.slice(0, limit);

  // Shuffle both
  shuffle(review);
  shuffle(limitedNew);

  // Review cards first, then new
  reviewQueue = [...review, ...limitedNew];
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function getDueCount() {
  const d = today();
  const due = words.filter(w => w.nextReview <= d);
  const review = due.filter(w => w.repetitions > 0);
  const newCards = due.filter(w => w.repetitions === 0);
  const limit = settings.newCardsLimit || 10;
  return review.length + Math.min(newCards.length, limit);
}

function showModePicker() {
  reviewMode = null;
  const container = document.getElementById('reviewContent');

  if (words.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="18" rx="3"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        <p>No words yet.<br>Go to <strong>Words</strong> tab to add your first flashcard.</p>
      </div>`;
    return;
  }

  const count = getDueCount();
  const total = words.length;

  const dueLabel = count > 0
    ? `<div class="mode-btn-count">${count} card${count !== 1 ? 's' : ''} due</div>`
    : `<div class="mode-btn-count" style="color:var(--text2)">No cards due</div>`;

  container.innerHTML = `
    <div class="mode-picker">
      <div class="mode-picker-title">Review</div>
      <button class="mode-btn" onclick="startReview('en2de')" ${count === 0 ? 'style="opacity:0.4;pointer-events:none"' : ''}>
        <div class="mode-btn-icon">EN</div>
        <div class="mode-btn-text">
          <div class="mode-btn-label">English &rarr; German (Type)</div>
          <div class="mode-btn-desc">See English, type the German word</div>
          ${dueLabel}
        </div>
      </button>
      <button class="mode-btn" onclick="startReview('en2de_flip')" ${count === 0 ? 'style="opacity:0.4;pointer-events:none"' : ''}>
        <div class="mode-btn-icon">EN</div>
        <div class="mode-btn-text">
          <div class="mode-btn-label">English &rarr; German (Flip)</div>
          <div class="mode-btn-desc">See English, flip to reveal German</div>
          ${dueLabel}
        </div>
      </button>
      <button class="mode-btn" onclick="startReview('de2en')" ${count === 0 ? 'style="opacity:0.4;pointer-events:none"' : ''}>
        <div class="mode-btn-icon">DE</div>
        <div class="mode-btn-text">
          <div class="mode-btn-label">German &rarr; English (Flip)</div>
          <div class="mode-btn-desc">See German, flip to reveal English</div>
          ${dueLabel}
        </div>
      </button>
      <div style="border-top:1px solid #333;margin:8px 0"></div>
      <button class="mode-btn" onclick="startPracticeAll()">
        <div class="mode-btn-icon" style="font-size:20px">ALL</div>
        <div class="mode-btn-text">
          <div class="mode-btn-label">Practice All (Flip)</div>
          <div class="mode-btn-desc">Go through all your cards, both directions</div>
          <div class="mode-btn-count">${total} card${total !== 1 ? 's' : ''} total</div>
        </div>
      </button>
    </div>`;
}

function startReview(mode) {
  reviewMode = mode;
  isPracticeAll = false;
  buildReviewQueue();
  showNextCard();
}

function startPracticeAll() {
  isPracticeAll = true;
  reviewMode = 'de2en'; // start with flip mode
  // Load ALL cards, shuffle, alternate directions
  const all = [...words];
  shuffle(all);
  reviewQueue = all;
  // Alternate direction per card
  practiceDirections = all.map((_, i) => i % 2 === 0 ? 'de2en' : 'en2de_flip');
  practiceIndex = 0;
  showNextCard();
}

function showNextCard() {
  isFlipped = false;
  const container = document.getElementById('reviewContent');

  if (reviewQueue.length === 0) {
    container.innerHTML = `
      <div class="done-message">
        <div class="check">&#10003;</div>
        <p>All done for now!<br>Come back later for more reviews.</p>
        <p style="margin-top:20px;font-size:13px;color:#666">Don't forget to <a href="#" onclick="event.preventDefault();exportData()" style="color:var(--accent);text-decoration:underline">export a backup</a> so you don't lose your progress.</p>
      </div>`;
    return;
  }

  currentCard = reviewQueue.shift();
  const remaining = reviewQueue.length + 1;

  // In Practice All mode, alternate direction per card
  if (isPracticeAll) {
    reviewMode = practiceDirections[practiceIndex] || 'de2en';
    practiceIndex++;
  }

  if (reviewMode === 'en2de') {
    // TYPE MODE: show English, type German
    container.innerHTML = `
      <div class="review-info"><span>${remaining}</span> card${remaining !== 1 ? 's' : ''} remaining</div>
      <div class="type-card">
        <div class="card-lang">ENGLISH</div>
        <div class="card-word">${escHtml(currentCard.en)}</div>
      </div>
      <div class="type-input-wrap">
        <input type="text" class="type-input" id="typeAnswer" placeholder="Type in German..." autocomplete="off" autocapitalize="none" spellcheck="false">
      </div>
      <button class="check-btn" id="checkBtn" onclick="checkAnswer()">Check</button>
      <div class="type-result" id="typeResult"></div>
      <div id="typeRating"></div>`;

    const inp = document.getElementById('typeAnswer');
    inp.focus();
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const checkBtn = document.getElementById('checkBtn');
        if (checkBtn) {
          checkAnswer();
        } else {
          // Already checked — next card
          const nb = document.getElementById('nextBtn');
          if (nb) nb.click();
        }
      }
    });
  } else {
    // FLIP MODE: de2en or en2de_flip
    const showDeFront = reviewMode === 'de2en';
    const frontLang = showDeFront ? 'Deutsch' : 'English';
    const frontWordHtml = showDeFront ? coloredDe(currentCard) : escHtml(currentCard.en);
    const backLang = showDeFront ? 'English' : 'Deutsch';
    const backWordHtml = showDeFront ? escHtml(currentCard.en) : coloredDe(currentCard);

    const deOnFront = showDeFront;
    const frontSpeak = deOnFront
      ? `<button class="speak-btn" onclick="event.stopPropagation();speakDe('${currentCard.de.replace(/'/g, "\\'")}')">${speakIcon}</button>`
      : '';
    const backSpeak = !deOnFront
      ? `<button class="speak-btn" onclick="event.stopPropagation();speakDe('${currentCard.de.replace(/'/g, "\\'")}')">${speakIcon}</button>`
      : '';

    container.innerHTML = `
      <div class="review-info"><span>${remaining}</span> card${remaining !== 1 ? 's' : ''} remaining</div>
      <div class="card-container" onclick="flipCard()">
        <div class="card-inner" id="cardInner">
          <div class="card-front">
            <div class="card-lang">${frontLang}</div>
            <div class="card-word">${frontWordHtml}</div>
            ${frontSpeak}
            <div class="card-hint">tap to flip</div>
          </div>
          <div class="card-back">
            <div class="card-lang">${backLang}</div>
            <div class="card-word">${backWordHtml}</div>
            ${backSpeak}
            <div class="card-hint">tap to flip back</div>
          </div>
        </div>
      </div>
      ${isPracticeAll
        ? '<div class="hidden" id="ratingBtns" style="width:100%;max-width:340px"><button class="next-btn" onclick="rate(0)">Next</button></div>'
        : `<div class="rating-buttons hidden" id="ratingBtns">
          <button class="rating-btn again" onclick="rate(0)">Again</button>
          <button class="rating-btn hard" onclick="rate(1)">Hard</button>
          <button class="rating-btn good" onclick="rate(2)">Good</button>
          <button class="rating-btn easy" onclick="rate(3)">Easy</button>
        </div>`
      }`;
  }
}

function checkAnswer() {
  if (!currentCard) return;
  const inp = document.getElementById('typeAnswer');
  const answer = inp.value.trim();
  if (!answer) return;

  function normalize(s) { return s.toLowerCase().replace(/[\s ​]+/g, ' ').trim(); }
  function norm(s) { return s.normalize('NFC').toLowerCase().replace(/\s+/g, ' ').trim(); }
  var g = currentCard.gender && currentCard.gender !== 'none' ? currentCard.gender + ' ' : '';
  var correctFull = norm(g + currentCard.de);
  var correctShort = norm(currentCard.de);
  var given = norm(answer);
  var isCorrect = given === correctFull || given === correctShort;

  inp.disabled = true;

  // Remove the check button
  const checkBtn = document.getElementById('checkBtn');
  if (checkBtn) checkBtn.remove();

  const resultDiv = document.getElementById('typeResult');
  const ratingDiv = document.getElementById('typeRating');

  const speakBtn = `<button class="speak-btn" style="display:inline-block;margin-top:8px" onclick="speakDe('${currentCard.de.replace(/'/g, "\\'")}')">${speakIcon}</button>`;
  const coloredAnswer = coloredDe(currentCard);

  if (isCorrect) {
    inp.classList.add('correct');
    resultDiv.innerHTML = `<div class="correct-word">${coloredAnswer}</div>${speakBtn}`;
    ratingDiv.innerHTML = `<button class="next-btn" id="nextBtn" onclick="rate(2)">Next</button>`;
  } else {
    inp.classList.add('wrong');
    resultDiv.innerHTML = `
      <div class="wrong-label">Correct answer:</div>
      <div class="correct-word">${coloredAnswer}</div>${speakBtn}`;
    ratingDiv.innerHTML = `<button class="next-btn" id="nextBtn" onclick="rate(0)">Next</button>`;
  }

  document.getElementById('nextBtn').focus();
}

function flipCard() {
  const inner = document.getElementById('cardInner');
  if (!isFlipped) {
    isFlipped = true;
    inner.classList.add('flipped');
    document.getElementById('ratingBtns').classList.remove('hidden');
  } else {
    isFlipped = false;
    inner.classList.remove('flipped');
  }
}

function rate(quality) {
  if (!currentCard) return;
  if (!isPracticeAll) {
    reviewCard(currentCard, quality);
  }
  showNextCard();
  updateStats();
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function speakDe(text) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'de-DE';
  u.rate = 0.85;
  window.speechSynthesis.speak(u);
}

const speakIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`;

// ===== WORDS LIST =====
function addWord() {
  const de = document.getElementById('inputDe').value.trim();
  const en = document.getElementById('inputEn').value.trim();
  if (!de || !en) return;

  words.push(createCard(de, en, selectedGender));
  save();

  document.getElementById('inputDe').value = '';
  document.getElementById('inputEn').value = '';
  document.getElementById('inputDe').focus();
  pickGender('none');

  renderWordList();
  buildReviewQueue();
}

function deleteWord(id) {
  words = words.filter(w => w.id !== id);
  save();
  renderWordList();
  reviewQueue = reviewQueue.filter(w => w.id !== id);
  updateStats();
}

function renderWordList() {
  const search = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const filtered = words.filter(w =>
    w.de.toLowerCase().includes(search) || w.en.toLowerCase().includes(search)
  );

  document.getElementById('wordCount').textContent = `${words.length} word${words.length !== 1 ? 's' : ''}`;

  // Show newest first
  const sorted = [...filtered].reverse();

  const list = document.getElementById('wordList');
  list.innerHTML = sorted.map(w => {
    let status = '';
    if (w.repetitions === 0) status = '<span>New</span>';
    else if (w.interval < 7) status = `<span class="learning">Learning</span>`;
    else status = `<span class="known">Known (${w.interval}d)</span>`;

    const g = w.gender || 'none';
    const gColor = genderColor(g);
    const gPrefix = g !== 'none' ? `<span class="word-item-gender" style="color:${gColor}">${g}</span>` : '';
    const deStyle = gColor ? ` style="color:${gColor}"` : '';

    return `<div class="word-item">
      <div class="word-item-text">
        <div class="word-item-de"${deStyle}>${gPrefix}${escHtml(w.de)}</div>
        <div class="word-item-en">${escHtml(w.en)}</div>
        <div class="word-item-streak">${status}</div>
      </div>
      <button class="word-delete" onclick="deleteWord(${w.id})">&times;</button>
    </div>`;
  }).join('');
}

// Handle enter key in inputs
document.getElementById('inputDe').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('inputEn').focus();
});
document.getElementById('inputEn').addEventListener('keydown', e => {
  if (e.key === 'Enter') addWord();
});

// ===== STATS =====
function updateStats() {
  // kept for internal use by other functions
}

// ===== EXPORT / IMPORT =====
function exportData() {
  try {
    var data = { words: words, notes: notes, settings: settings, exportDate: new Date().toISOString() };
    var json = JSON.stringify(data, null, 2);
    var blob = new Blob([json], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'karteikarten-backup.json';
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(function() {
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 100);
  } catch(e) {
    alert('Export error: ' + e.message);
  }
}

function shareBackup() {
  try {
    var isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);
    if (isMobile && navigator.share) {
      var data = { words: words, notes: notes, settings: settings, exportDate: new Date().toISOString() };
      var json = JSON.stringify(data, null, 2);
      var file = new File([json], 'karteikarten-backup.json', { type: 'application/json' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file] }).catch(function() {});
      } else {
        exportData();
      }
    } else {
      exportData();
    }
  } catch(e) {
    exportData();
  }
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);

      // Support full backup (has words) or notes-only JSON
      const hasWords = data.words && Array.isArray(data.words);
      const hasNotes = data.notes && Array.isArray(data.notes);

      if (!hasWords && !hasNotes) {
        alert('Invalid backup file.');
        return;
      }

      let msg = [];

      if (hasWords) {
        words = data.words;
        save();
        msg.push(words.length + ' words');
      }

      if (hasNotes) {
        // Merge: add new notes (by id), update existing
        const existingIds = new Set(notes.map(n => n.id));
        let added = 0;
        data.notes.forEach(n => {
          if (!existingIds.has(n.id)) {
            notes.push(n);
            added++;
          }
        });
        saveNotes();
        msg.push((hasWords ? data.notes.length : added) + ' notes');
      }

      if (data.settings) {
        settings = data.settings;
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
        document.getElementById('newCardsLimit').value = settings.newCardsLimit || 10;
      }

      buildReviewQueue();
      renderWordList();
      updateStats();

      if (hasNotes && !hasWords) {
        // Notes-only import — go to Notes tab
        switchScreen('Notes');
        alert('Import successful! Notes added.');
      } else {
        switchScreen('Review');
        alert('Import successful! ' + msg.join(', ') + ' loaded.');
      }
    } catch(err) {
      alert('Could not read file.');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ===== DELETE ALL =====
function showDeleteModal() { document.getElementById('deleteModal').classList.add('show'); }
function hideDeleteModal() { document.getElementById('deleteModal').classList.remove('show'); }
function deleteAll() {
  words = [];
  notes = [];
  save();
  saveNotes();
  hideDeleteModal();
  buildReviewQueue();
  renderWordList();
  updateStats();
  switchScreen('Review');
}

// ===== NOTES =====
let editingNoteId = null;

function createNote(title, category, content) {
  return {
    id: Date.now() + Math.random(),
    title: title.trim(),
    category: (category || '').trim(),
    content: content.trim(),
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString()
  };
}

function renderNotesList() {
  const search = (document.getElementById('notesSearch')?.value || '').toLowerCase();
  const filtered = notes.filter(n =>
    n.title.toLowerCase().includes(search) ||
    (n.category || '').toLowerCase().includes(search) ||
    n.content.toLowerCase().includes(search)
  );

  document.getElementById('noteCount').textContent = `${notes.length} note${notes.length !== 1 ? 's' : ''}`;

  const sorted = [...filtered].sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
  const list = document.getElementById('notesList');

  if (sorted.length === 0 && notes.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <p>No notes yet.<br>Tap <strong>+ Add Note</strong> or ask Claude for notes and <strong>import the JSON</strong>.</p>
    </div>`;
    return;
  }

  list.innerHTML = sorted.map(n => {
    const cat = n.category ? `<div class="note-card-category">${escHtml(n.category)}</div>` : '';
    const preview = cleanPreview(n.content);
    return `<div class="note-card" onclick="viewNote(${n.id})">
      ${cat}
      <div class="note-card-title">${escHtml(n.title)}</div>
      <div class="note-card-preview">${escHtml(preview)}</div>
    </div>`;
  }).join('');
}

function viewNote(id) {
  const note = notes.find(n => n.id === id);
  if (!note) return;

  const container = document.getElementById('notesContent');
  const cat = note.category ? `<div class="note-viewer-category">${escHtml(note.category)}</div>` : '';

  container.innerHTML = `
    <div class="note-viewer">
      <div class="note-viewer-header">
        <button class="note-back-btn" onclick="showNotesList()">&#8592; Back</button>
        <div class="note-viewer-actions">
          <button class="note-action-btn" onclick="editNote(${note.id})">Edit</button>
          <button class="note-action-btn danger" onclick="deleteNote(${note.id})">Delete</button>
        </div>
      </div>
      <div class="note-viewer-title">${escHtml(note.title)}</div>
      ${cat}
      <div class="note-viewer-content">${formatNoteContent(note.content)}</div>
    </div>`;
}

function formatNoteContent(text) {
  try { return _renderNote(text); } catch(e) { return escHtml(text).replace(/\n/g, '<br>'); }
}
function _renderNote(rawText) {
  // Strip first line if it's a # heading (already shown as note title)
  let text = rawText.trim();
  const firstLine = text.split('\n')[0];
  if (/^#\s/.test(firstLine)) {
    text = text.substring(firstLine.length);
  }
  text = text.replace(/^\n+/, ''); // remove leading blank lines
  const lines = text.split('\n');
  let html = '';
  let inTable = false;
  let inList = false;
  let listType = '';

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];

    // Table separator row (---|---|---) — skip
    if (/^\s*\|?\s*[-:]+[-|:\s]+$/.test(line)) continue;

    // Table row (starts with |)
    if (/\|/.test(line) && line.trim().startsWith('|')) {
      if (!inTable) {
        if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
        html += '<div class="note-table-wrap"><table class="note-table">';
        inTable = true;
        const nextLine = lines[i + 1] || '';
        const isHeader = /^\s*\|?\s*[-:]+[-|:\s]+$/.test(nextLine);
        const cells = line.split('|').filter(c => c.trim() !== '');
        const tag = isHeader ? 'th' : 'td';
        html += '<tr>' + cells.map(c => `<${tag}>${fmtInline(c.trim())}</${tag}>`).join('') + '</tr>';
        continue;
      }
      const cells = line.split('|').filter(c => c.trim() !== '');
      html += '<tr>' + cells.map(c => `<td>${fmtInline(c.trim())}</td>`).join('') + '</tr>';
      continue;
    } else if (inTable) { html += '</table></div>'; inTable = false; }

    // Headings
    if (/^#{1,3}\s/.test(line)) {
      if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
      const lvl = line.match(/^(#{1,3})/)[1].length;
      const txt = line.replace(/^#{1,3}\s+/, '');
      const sz = { 1: '20px', 2: '17px', 3: '15px' };
      html += `<div style="font-size:${sz[lvl]};font-weight:700;margin:16px 0 8px;color:var(--text)">${fmtInline(txt)}</div>`;
      continue;
    }

    // Unordered list
    if (/^\s*[-•*]\s/.test(line)) {
      if (!inList || listType !== 'ul') {
        if (inList) html += listType === 'ul' ? '</ul>' : '</ol>';
        html += '<ul class="note-list">'; inList = true; listType = 'ul';
      }
      html += `<li>${fmtInline(line.replace(/^\s*[-•*]\s+/, ''))}</li>`;
      continue;
    }

    // Ordered list
    if (/^\s*\d+\.\s/.test(line)) {
      if (!inList || listType !== 'ol') {
        if (inList) html += listType === 'ul' ? '</ul>' : '</ol>';
        html += '<ol class="note-list">'; inList = true; listType = 'ol';
      }
      html += `<li>${fmtInline(line.replace(/^\s*\d+\.\s+/, ''))}</li>`;
      continue;
    }

    if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }

    if (line.trim() === '') { html += '<div style="height:8px"></div>'; continue; }

    html += `<div>${fmtInline(line)}</div>`;
  }

  if (inTable) html += '</table></div>';
  if (inList) html += listType === 'ul' ? '</ul>' : '</ol>';
  return html;
}

function fmtInline(text) {
  try {
    let s = escHtml(text);
    // Bold: **text** (no color, just bold)
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Inline code: `text`
    s = s.replace(/`(.+?)`/g, '<code style="background:#2a2a2a;padding:1px 5px;border-radius:4px;font-size:13px">$1</code>');
    // Strip all {{tags}} — just show the text inside
    s = s.replace(/\{\{[a-z]+[ :](.*?)\}\}/g, '$1');
    s = s.replace(/\{\{(.*?)\}\}/g, '$1');
    // Arrow: -> to →
    s = s.replace(/-&gt;/g, '→');
    return s;
  } catch(e) {
    return escHtml(text);
  }
}

function cleanPreview(content) {
  let s = content;
  s = s.replace(/^#{1,3}\s+/gm, '');
  s = s.replace(/\{\{[a-z]+[ :](.*?)\}\}/g, '$1');
  s = s.replace(/\{\{(.*?)\}\}/g, '$1');
  s = s.replace(/\*\*(.+?)\*\*/g, '$1');
  s = s.replace(/\|[-:\s|]+\|/g, '');
  s = s.replace(/\|/g, ' · ');
  s = s.replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
  return s.slice(0, 120);
}

function showNotesList() {
  const container = document.getElementById('notesContent');
  container.innerHTML = `
    <h1 class="screen-title">Notes</h1>
    <button class="notes-add-btn" onclick="openNoteEditor()">+ Add Note</button>
    <input type="text" class="notes-search" id="notesSearch" placeholder="Search notes..." oninput="renderNotesList()">
    <div class="note-count" id="noteCount"></div>
    <div class="notes-list" id="notesList"></div>`;
  renderNotesList();
}

function openNoteEditor(noteId) {
  editingNoteId = noteId || null;
  const overlay = document.getElementById('noteEditorOverlay');
  const title = document.getElementById('noteEditorTitle');
  const inputTitle = document.getElementById('noteInputTitle');
  const inputCat = document.getElementById('noteInputCategory');
  const inputContent = document.getElementById('noteInputContent');

  if (noteId) {
    const note = notes.find(n => n.id === noteId);
    if (!note) return;
    title.textContent = 'Edit Note';
    inputTitle.value = note.title;
    inputCat.value = note.category || '';
    inputContent.value = note.content;
  } else {
    title.textContent = 'New Note';
    inputTitle.value = '';
    inputCat.value = '';
    inputContent.value = '';
  }

  overlay.classList.add('show');
  inputTitle.focus();
}

function closeNoteEditor() {
  document.getElementById('noteEditorOverlay').classList.remove('show');
  editingNoteId = null;
}

function saveNote() {
  const title = document.getElementById('noteInputTitle').value.trim();
  const category = document.getElementById('noteInputCategory').value.trim();
  const content = document.getElementById('noteInputContent').value.trim();

  if (!title || !content) {
    alert('Please add a title and content.');
    return;
  }

  if (editingNoteId) {
    const note = notes.find(n => n.id === editingNoteId);
    if (note) {
      note.title = title;
      note.category = category;
      note.content = content;
      note.updatedAt = new Date().toISOString();
    }
  } else {
    notes.push(createNote(title, category, content));
  }

  saveNotes();
  closeNoteEditor();
  showNotesList();
}

function editNote(id) {
  openNoteEditor(id);
}

function deleteNote(id) {
  if (!confirm('Delete this note?')) return;
  notes = notes.filter(n => n.id !== id);
  saveNotes();
  showNotesList();
}

// ===== NAVIGATION =====
function switchScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen' + name).classList.add('active');
  document.getElementById('nav' + name).classList.add('active');

  if (name === 'Review') showModePicker();
  if (name === 'Words') renderWordList();
  if (name === 'Notes') showNotesList();
  if (name === 'Settings') updateStats();
}

showModePicker();
updateStats();
if (/iPhone|iPad|Android/i.test(navigator.userAgent)) {
  var shareBtn = document.getElementById('shareBtnMobile');
  if (shareBtn) shareBtn.style.display = '';
}
